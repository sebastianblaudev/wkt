<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.W.A.T. ADMIN PORTAL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="style.css">
    <style>
        /* Admin Specific Overrides */
        body {
            background-color: #0b0b0c;
            /* Deep dark background */
            color: #fff;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
        }

        /* Login Screen */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            background: #1a1a1d;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #333;
            text-align: center;
            width: 320px;
        }

        .login-box h2 {
            color: #50E3C2;
            margin-bottom: 24px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .login-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            background: #0d0d0f;
            border: 1px solid #333;
            color: #fff;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: #50E3C2;
            color: #000;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        /* Dashboard Layout */
        .dashboard-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
            background-color: #0b0b0c;
            /* Deep dark background */
            padding: 24px;
            box-sizing: border-box;
            gap: 24px;
        }

        .dashboard-container.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Slim Left Navigation Sidebar */
        .nav-sidebar {
            width: 70px;
            background: #0b0b0c;
            /* Match background but maybe add a subtle border or gradient if needed. 
               In mockup, left column blends slightly with main bg but has icons. */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 0;
            gap: 24px;
        }

        .nav-icon {
            color: #333;
            cursor: pointer;
            transition: color 0.2s, transform 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 48px;
            height: 48px;
            border-radius: 12px;
        }

        .nav-icon:hover {
            color: #666;
        }

        .nav-icon.active {
            color: #50E3C2;
            background: rgba(80, 227, 194, 0.05);
        }

        .nav-icon .material-icons-round {
            font-size: 24px;
        }

        /* Main Content Area (Map + Header) */
        .admin-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #111113;
            border-radius: 20px;
            border: 1px solid #1a1a1c;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .top-header {
            padding: 24px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1a1a1c;
            background: #111113;
        }

        .header-title {
            font-size: 11px;
            font-weight: 700;
            color: #888;
            letter-spacing: 2px;
        }

        .header-stats {
            font-size: 12px;
            font-weight: 700;
        }

        .stat-label {
            color: #555;
            margin-right: 8px;
            letter-spacing: 1px;
        }

        .stat-value {
            color: #ccc;
        }

        .map-container {
            flex: 1;
            position: relative;
            background: #0f0f11;
            padding: 20px;
        }

        #admin-map {
            width: 100%;
            height: 100%;
            border-radius: 16px;
            background-color: transparent;
            z-index: 10;
        }

        /* Overlay grid lines on map to match mockup */
        #admin-map::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 400;
            /* above tiles, below markers */
            border-radius: 16px;
        }

        /* Right Panel (Units List) */
        .right-panel {
            width: 340px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-top: 10px;
        }

        .units-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-right: 8px;
        }

        /* custom scrollbar for units list */
        .units-list::-webkit-scrollbar {
            width: 4px;
        }

        .units-list::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }

        /* Unit Card Styling (Mockup Style) */
        .unit-item {
            background: #1a1a1c;
            border-radius: 14px;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: default;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .unit-item .u-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #555;
            flex-shrink: 0;
        }

        /* Channel Item Styles */
        .channel-item {
            background: #1a1a1c;
            border-radius: 8px;
            padding: 10px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.02);
            font-size: 13px;
            font-weight: 600;
            color: #ccc;
        }
        
        .btn-icon {
            background: rgba(255,59,48,0.1);
            color: #ff3b30;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            padding: 4px;
            font-size: 16px;
            display: flex;
            transition: 0.2s;
        }
        .btn-icon:hover {
            background: rgba(255,59,48,0.3);
        }

        .unit-item .u-dot.status-active {
            background: #50E3C2;
            box-shadow: 0 0 12px rgba(80, 227, 194, 0.6);
        }

        .unit-item .u-dot.status-offline {
            background: #555;
        }

        .unit-item .u-dot.status-waiting {
            background: #ff9f43;
            box-shadow: 0 0 12px rgba(255, 159, 67, 0.6);
        }

        .unit-item .u-info {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .unit-item .u-name {
            font-weight: 600;
            font-size: 13px;
            color: #999;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Map Marker Custom Style */
        .glow-marker {
            background-color: #50E3C2;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            box-shadow: 0 0 20px 6px rgba(80, 227, 194, 0.4);
            border: 2px solid #111113;
            /* border matching map bg to separate glowing dot */
        }

        /* Incident Marker Styles */
        .incident-marker {
            background-color: #ff3b30;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            box-shadow: 0 0 20px 8px rgba(255, 59, 48, 0.5);
            border: 2px solid #111113;
            animation: pulse-red 1.5s infinite;
        }

        @keyframes pulse-red {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7);
            }

            70% {
                box-shadow: 0 0 0 15px rgba(255, 59, 48, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(255, 59, 48, 0);
            }
        }

        .leaflet-container {
            font-family: 'Inter', sans-serif !important;
            background: transparent !important;
        }
    </style>
</head>

<body>

    <!-- Login Screen -->
    <div id="login-screen" class="login-screen">
        <div class="login-box">
            <h2>COMMAND LOGIN</h2>
            <div id="login-error" style="color: #ff5e57; font-size: 12px; margin-bottom: 12px; display: none;"></div>
            <input type="text" id="op-id-input" class="login-input" placeholder="Operation ID (e.g. walmart-ops)">
            <input type="password" id="op-pass-input" class="login-input" placeholder="Admin Password">
            <button id="login-btn" class="btn-primary">AUTHENTICATE</button>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard-container" class="dashboard-container">

        <!-- Slim Left Navigation Sidebar -->
        <div class="nav-sidebar">
            <div class="nav-icon active">
                <span class="material-icons-round">dashboard</span>
            </div>
            <div class="nav-icon">
                <span class="material-icons-round">map</span>
            </div>
            <div class="nav-icon">
                <span class="material-icons-round">people</span>
            </div>
            <div style="margin-top: auto; padding-bottom: 20px;">
                <div class="nav-icon" id="generate-invite-btn" title="Generate Invite Link">
                    <span class="material-icons-round">link</span>
                </div>
            </div>
        </div>

        <!-- Main Content Area -->
        <div class="admin-main">
            <!-- Top Header -->
            <div class="top-header">
                <div class="header-title">OPERATIONAL OVERWATCH</div>
                <div class="header-stats">
                    <span class="stat-label">CHAOS:</span><span class="stat-value" id="chaos-index-val"
                        style="color:#50E3C2; margin-right: 15px;">0% (BAJO)</span>
                    <span class="stat-label">UNITS:</span><span class="stat-value" id="total-unit-count">12</span>
                    <span class="stat-label" style="margin-left: 15px;">ACTIVE:</span><span class="stat-value"
                        id="active-unit-count">08</span>
                </div>
            </div>

            <!-- Map Area -->
            <div class="map-container">
                <div id="admin-map"></div>
                <button id="fuse-incidents-btn" class="btn-primary"
                    style="display:none; position:absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; width: auto; padding: 10px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">FUSE
                    SELECTED INCIDENTS</button>
            </div>
        </div>

        <!-- Right Panel (Channels & Units List) -->
        <div class="right-panel">
            <!-- Channels Section -->
            <div style="font-size:11px; font-weight:700; color:#888; letter-spacing:2px; margin-bottom: 8px;">OPERATION CHANNELS</div>
            <div id="channel-list" style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; max-height: 250px; overflow-y: auto;">
                <!-- Channel items injected here -->
            </div>
            <div style="display: flex; gap: 8px; margin-bottom: 24px;">
                <input type="text" id="new-channel-name" class="login-input" style="margin-bottom: 0; padding: 10px; font-size: 12px;" placeholder="CHANNEL NAME...">
                <button id="add-channel-btn" class="btn-primary" style="width: auto; padding: 10px 16px; font-size: 12px;">ADD</button>
            </div>

            <!-- Units Section -->
            <div style="font-size:11px; font-weight:700; color:#888; letter-spacing:2px; margin-bottom: 8px;">ACTIVE UNITS</div>
            <div class="units-list" id="units-list">
                <!-- Unit cards injected here -->
                <div
                    style="padding: 20px; text-align: center; color: #444; font-size: 12px; font-family: 'Inter', sans-serif;">
                    WAITING FOR SIGNALS...
                </div>
            </div>

            <!-- Hidden inputs/data for logic compatibility -->
            <div id="display-op-id" style="display:none;"></div>
        </div>

    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script type="module" src="admin.js"></script>
</body>

</html>
